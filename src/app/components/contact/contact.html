<section id="contact" class="section">
  <div class="container">

    <div class="section-header">
      <h2 class="section-title">Contact</h2>
      <div class="title-underline"></div>
    </div>

    <div class="contact-content">

      <form class="contact-form" (ngSubmit)="onSubmit()" #contactForm="ngForm" data-aos="fade-up">
        <div class="form-group">
          <input
            type="email"
            name="email"
            [(ngModel)]="formData.email"
            placeholder="Email"
            required
            class="form-control"
          />
        </div>

        <div class="form-group">
          <textarea
            name="message"
            [(ngModel)]="formData.message"
            placeholder="Message"
            rows="6"
            required
            class="form-control"
          ></textarea>
        </div>

        <button type="submit" class="btn-submit" [disabled]="!contactForm.valid">
          SUBMIT
        </button>

        <div *ngIf="submitMessage" class="submit-message" [class.success]="submitSuccess">
          {{ submitMessage }}
        </div>
      </form>

      <div class="social-links" data-aos="fade-up" data-aos-delay="100">
        <div *ngFor="let link of socialLinks" class="social-item">
          <div class="social-link" (click)="openLink(link.url)" [title]="link.name">
            <img [src]="getSocialIcon(link.icon)" [alt]="link.name" />
          </div>
        </div>
      </div>

      <div class="footer-text" data-aos="fade-up" data-aos-delay="200">
        <p>❤️ Thanks for visiting! ❤️</p>
      </div>

    </div>
  </div>
</section>
